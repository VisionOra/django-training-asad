<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blog Application{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }

        nav {
            background: #2c3e50;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav a { color: white; text-decoration: none; margin-left: 15px; font-size: 15px; }
        nav a:hover { text-decoration: underline; }
        nav .brand { font-size: 20px; font-weight: bold; color: #1abc9c; }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }

        .messages { margin-bottom: 20px; }
        .messages li {
            padding: 10px 15px;
            border-radius: 5px;
            list-style: none;
            background: #d4edda;
            color: #155724;
            margin-bottom: 8px;
        }

        .btn {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }
        .btn-primary  { background: #1abc9c; color: white; }
        .btn-warning  { background: #f39c12; color: white; }
        .btn-danger   { background: #e74c3c; color: white; }
        .btn-secondary{ background: #95a5a6; color: white; }
        .btn:hover { opacity: 0.85; }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 60px;
            color: #888;
            font-size: 13px;
        }
    </style>
</head>
<body>

<nav>
    <a class="brand" href="{% url 'post_list' %}">📝 Blog App</a>
    <div>
        {% if user.is_authenticated %}
            <span style="color:white;">{{ user.username }}</span>
        {% endif %}
        <a href="{% url 'swagger-ui' %}">API Docs</a>
    </div>
</nav>

<div class="container">
    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    {% block content %}{% endblock %}
</div>

<footer>Blog Application &copy; 2025</footer>

</body>
</html>
